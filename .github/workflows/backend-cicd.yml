# 백엔드 API CI/CD 파이프라인 
# 실행 중인 인스턴스에 코드 직접 배포 (빠른 배포)       
name: Backend API CI/CD

on:
  push:
    branches: [ dev, jacky2 ]
    paths:
      - 'backend/**'
      - 'scripts/**'
      - '.github/workflows/backend-cicd.yml'

# 환경 변수 설정
env:
  AWS_REGION: ap-northeast-2
  # ASG 설정
  ASG_NAME: pumati-load-test-backend-asg
  # 배포 설정
  DEPLOY_USER: ec2-user
  BACKEND_PORT: 5001
  HEALTH_CHECK_PATH: /health
  PUBLIC_URL: https://chat.goorm-ktb-008.goorm.team

jobs:
  # 실행 중인 인스턴스에 코드 직접 배포
  deploy-to-running-instances:
    runs-on: ubuntu-latest
    
    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: AWS 자격증명 설정
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: 배포 메타데이터 생성
      id: meta
      run: |
        # Git 커밋 해시의 짧은 버전 생성
        SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
        
        # 타임스탬프 생성
        TIMESTAMP=$(date +%Y%m%d-%H%M%S)
        
        echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
        echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
        echo "deployment_id=deploy-${TIMESTAMP}-${SHORT_SHA}" >> $GITHUB_OUTPUT

    - name: ASG 인스턴스 목록 가져오기
      id: get-instances
      run: |
        echo "🔍 ASG에서 실행 중인 인스턴스 목록 가져오는 중..."
        
        # ASG에서 InService 상태의 인스턴스 ID 목록 가져오기
        INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
          --auto-scaling-group-names ${{ env.ASG_NAME }} \
          --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
          --output text)
        
        if [[ -z "$INSTANCE_IDS" ]]; then
          echo "❌ 실행 중인 인스턴스를 찾을 수 없습니다."
          exit 1
        fi
        
        # 인스턴스 세부 정보 가져오기 (IP 주소 포함)
        echo "📋 인스턴스 세부 정보:"
        INSTANCE_IPS=""
        INSTANCE_COUNT=0
        
        for INSTANCE_ID in $INSTANCE_IDS; do
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids $INSTANCE_ID \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          
          PRIVATE_IP=$(aws ec2 describe-instances \
            --instance-ids $INSTANCE_ID \
            --query 'Reservations[0].Instances[0].PrivateIpAddress' \
            --output text)
          
          echo "- ${INSTANCE_ID}: Public=${PUBLIC_IP}, Private=${PRIVATE_IP}"
          
          if [[ "$PUBLIC_IP" != "None" && "$PUBLIC_IP" != "" ]]; then
            INSTANCE_IPS="${INSTANCE_IPS}${PUBLIC_IP} "
            INSTANCE_COUNT=$((INSTANCE_COUNT + 1))
          fi
        done
        
        echo "✅ 배포 대상 인스턴스: ${INSTANCE_COUNT}개"
        echo "instance_ids=${INSTANCE_IDS}" >> $GITHUB_OUTPUT
        echo "instance_ips=${INSTANCE_IPS}" >> $GITHUB_OUTPUT
        echo "instance_count=${INSTANCE_COUNT}" >> $GITHUB_OUTPUT
        
        # appleboy/ssh-action을 위한 콤마(,)로 구분된 IP 목록 생성
        COMMA_SEPARATED_IPS=$(echo $INSTANCE_IPS | tr ' ' ',' | sed 's/,$//')
        echo "instance_ips_comma=${COMMA_SEPARATED_IPS}" >> $GITHUB_OUTPUT

    - name: 🚀 EC2에 SSH 자동 배포 실행
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ steps.get-instances.outputs.instance_ips_comma }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        script: |
          #!/bin/bash
          set -e
          
          # 에러 발생 시 상세 로그 출력하는 함수
          error_exit() {
            echo "❌ 에러 발생: $1"
            echo "📋 현재 상태 점검:"
            echo "- 현재 디렉토리: $(pwd)"
            echo "- 사용 가능한 메모리: $(free -h)"
            echo "- 디스크 사용량: $(df -h)"
            echo "- Node.js 버전: $(node --version 2>/dev/null || echo 'Node.js 없음')"
            echo "- NPM 버전: $(npm --version 2>/dev/null || echo 'NPM 없음')"
            echo "- PM2 상태: $(pm2 list 2>/dev/null || echo 'PM2 없음')"
            exit 1
          }
          
          echo "🚀 자동 배포 시작..."
          
          # Node.js 및 PM2 강제 설치 (경로 문제 해결)
          echo "📦 Node.js 설치 중..."
          curl -fsSL https://rpm.nodesource.com/setup_18.x | sudo bash - || error_exit "Node.js 저장소 추가 실패"
          sudo yum install -y nodejs || error_exit "Node.js 설치 실패"
          
          echo "📦 PM2 설치 중..."
          sudo npm install -g pm2 || error_exit "PM2 설치 실패"
          
          # PATH 환경변수 갱신
          export PATH=$PATH:/usr/bin:/usr/local/bin
          
          # 설치 확인
          echo "✅ 설치된 버전 확인:"
          echo "- Node.js: $(node --version)"
          echo "- NPM: $(npm --version)"
          echo "- PM2: $(pm2 --version)"
          
          echo "✅ 환경 설정 완료"
          
          # 시스템 최적화
          echo "🔧 시스템 최적화 중..."
          sudo swapoff -a || error_exit "스왑 비활성화 실패"
          echo "✅ 스왑 비활성화 완료"
          
          # 코드 다운로드 및 .env 파일 생성
          echo "📥 소스코드 다운로드 중..."
          cd /tmp && rm -rf ktb-new
          git clone -b jacky2 https://github.com/100-hours-a-week/8-ktb-chat.git ktb-new || error_exit "Git 클론 실패"
          echo "✅ 소스코드 다운로드 완료"
          
          # .env 파일을 다운받은 코드 폴더에 직접 생성
          echo "📝 환경 변수 파일 생성 중..."
          cat << 'EOF' > /tmp/ktb-new/backend/.env
          ${{ secrets.ENV_BACKEND_DEV }}
          S3_BUCKET_NAME=pumati-loadtest
          EOF
          echo "✅ .env 파일 생성 완료"
          
          # 애플리케이션 배포
          echo "🛑 기존 애플리케이션 정리 중..."
          sudo -u ec2-user pm2 delete all || echo "⚠️ 기존 PM2 프로세스 없음"
          
          echo "📁 배포 디렉토리 설정 중..."
          sudo mkdir -p /opt/ktb-chat-backend || error_exit "배포 디렉토리 생성 실패"
          sudo cp -r ktb-new/backend /opt/ktb-chat-backend/ || error_exit "파일 복사 실패"
          sudo chown -R ec2-user:ec2-user /opt/ktb-chat-backend || error_exit "권한 설정 실패"
          
          echo "📦 의존성 설치 중..."
          cd /opt/ktb-chat-backend/backend || error_exit "배포 디렉토리 이동 실패"
          
          # package.json 확인
          if [[ ! -f "package.json" ]]; then
            error_exit "package.json 파일을 찾을 수 없습니다"
          fi
          
          # .env 파일 확인
          if [[ ! -f ".env" ]]; then
            error_exit ".env 파일을 찾을 수 없습니다"
          fi
          
          sudo -u ec2-user npm ci --production || error_exit "NPM 의존성 설치 실패"
          echo "✅ 의존성 설치 완료"
          
          # PM2 단일 인스턴스 모드로 시작
          echo "🚀 PM2 단일 인스턴스 모드로 애플리케이션 시작 중..."
          sudo -u ec2-user pm2 start server.js \
            --name 'ktb-backend-single' \
            --max-memory-restart 700M \
            --node-args='--max-old-space-size=600' || error_exit "PM2 애플리케이션 시작 실패"
          
          sudo -u ec2-user pm2 save || error_exit "PM2 설정 저장 실패"
          sudo env PATH=$PATH:/usr/bin /usr/lib/node_modules/pm2/bin/pm2 startup systemd -u ec2-user --hp /home/ec2-user || error_exit "PM2 자동 시작 설정 실패"
          
          echo "⏳ 애플리케이션 시작 대기 중..."
          sleep 5
          
          echo "📊 PM2 프로세스 상태 확인:"
          sudo -u ec2-user pm2 list || error_exit "PM2 상태 확인 실패"
          
          echo "📊 애플리케이션 로그 확인 (최근 10줄):"
          sudo -u ec2-user pm2 logs --lines 10 --nostream || echo "⚠️ 로그를 가져올 수 없습니다"
          
          echo "✅ 배포 완료!"

    - name: ALB Target Group 헬스체크
      id: verify-deployment
      run: |
        echo "🔍 ALB Target Group 상태 검증 중..."
        
        # ASG에 연결된 Target Group ARN 가져오기
        TARGET_GROUP_ARN=$(aws autoscaling describe-auto-scaling-groups \
          --auto-scaling-group-names ${{ env.ASG_NAME }} \
          --query 'AutoScalingGroups[0].TargetGroupARNs[0]' \
          --output text)
        
        if [[ "$TARGET_GROUP_ARN" == "None" || -z "$TARGET_GROUP_ARN" ]]; then
          echo "❌ ASG에 연결된 Target Group을 찾을 수 없습니다."
          exit 1
        fi
        echo "🎯 대상 Target Group: ${TARGET_GROUP_ARN}"

        # 모든 대상이 healthy 상태가 될 때까지 대기 (최대 3분)
        echo "⏳ 모든 인스턴스가 ALB에서 Healthy 상태가 될 때까지 대기 중..."
        TIMEOUT=180
        ELAPSED=0
        ALL_HEALTHY=false

        while [[ $ELAPSED -lt $TIMEOUT ]]; do
          HEALTH_STATUS=$(aws elbv2 describe-target-health --target-group-arn ${TARGET_GROUP_ARN})
          
          # unhealthy 또는 initial 상태인 인스턴스 수 확인
          UNHEALTHY_COUNT=$(echo "$HEALTH_STATUS" | jq '[.TargetHealthDescriptions[] | select(.TargetHealth.State != "healthy")] | length')
          
          if [[ $UNHEALTHY_COUNT -eq 0 ]]; then
            TOTAL_TARGETS=$(echo "$HEALTH_STATUS" | jq '[.TargetHealthDescriptions[]] | length')
            HEALTHY_TARGETS=$(echo "$HEALTH_STATUS" | jq '[.TargetHealthDescriptions[] | select(.TargetHealth.State == "healthy")] | length')
            if [[ $TOTAL_TARGETS -gt 0 && $TOTAL_TARGETS -eq $HEALTHY_TARGETS ]]; then
              echo "✅ 모든 ${HEALTHY_TARGETS}개 인스턴스가 Healthy 상태입니다!"
              ALL_HEALTHY=true
              break
            fi
          fi
          
          echo "현재 상태: $(echo "$HEALTH_STATUS" | jq -r '.TargetHealthDescriptions[] | .Target.Id + ": " + .TargetHealth.State' | tr '\n' ' | ') (${ELAPSED}초 경과)"
          sleep 15
          ELAPSED=$((ELAPSED + 15))
        done

        if [[ "$ALL_HEALTHY" != "true" ]]; then
          echo "❌ 일부 인스턴스가 Healthy 상태가 되지 않았습니다."
          exit 1
        fi

        # 최종 Public URL 헬스체크
        echo "🌐 최종 Public URL 헬스체크 중... (${{ env.PUBLIC_URL }}/health)"
        HEALTH_CHECK_ATTEMPTS=3
        HEALTH_CHECK_SUCCESS=false
        
        for attempt in $(seq 1 $HEALTH_CHECK_ATTEMPTS); do
          echo "🔍 헬스체크 시도 ${attempt}/${HEALTH_CHECK_ATTEMPTS}..."
          
          if curl -f -L --max-redirs 3 --connect-timeout 10 --max-time 30 ${{ env.PUBLIC_URL }}/health; then
            echo "🎉 Public URL 헬스체크 성공!"
            HEALTH_CHECK_SUCCESS=true
            break
          else
            echo "⚠️ 헬스체크 시도 ${attempt} 실패"
            if [[ $attempt -lt $HEALTH_CHECK_ATTEMPTS ]]; then
              echo "⏳ 10초 후 재시도..."
              sleep 10
            fi
          fi
        done
        
        if [[ "$HEALTH_CHECK_SUCCESS" != "true" ]]; then
          echo "❌ Public URL 헬스체크가 ${HEALTH_CHECK_ATTEMPTS}번 모두 실패했습니다."
          echo "🔍 ALB 및 Target Group 상태를 확인하세요."
          exit 1
        fi
        
        echo "healthy_count=${HEALTHY_TARGETS}" >> $GITHUB_OUTPUT
        echo "unhealthy_instances=''" >> $GITHUB_OUTPUT # Target Group 헬스체크로 대체

    - name: 배포 결과 요약
      if: always()
      run: |
        # 배포 성공/실패 상태 확인
        if [[ "${{ job.status }}" == "success" ]]; then
          echo "## 🎉 코드 배포 및 검증 성공" >> $GITHUB_STEP_SUMMARY
        else
          echo "## ❌ 코드 배포 실패" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚨 실패 원인 분석" >> $GITHUB_STEP_SUMMARY
          echo "- 배포 과정에서 오류가 발생했습니다" >> $GITHUB_STEP_SUMMARY
          echo "- 위의 로그를 확인하여 구체적인 오류 메시지를 찾아보세요" >> $GITHUB_STEP_SUMMARY
          echo "- 일반적인 원인: Node.js 설치 실패, Git 클론 실패, 의존성 설치 실패, PM2 시작 실패" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📋 배포 정보" >> $GITHUB_STEP_SUMMARY
        echo "- **배포 ID**: \`${{ steps.meta.outputs.deployment_id }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **커밋**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **브랜치**: jacky2" >> $GITHUB_STEP_SUMMARY
        echo "- **배포 시간**: ${{ steps.meta.outputs.timestamp }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🎯 배포 대상" >> $GITHUB_STEP_SUMMARY
        echo "- **ASG**: \`${{ env.ASG_NAME }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **대상 인스턴스**: ${{ steps.get-instances.outputs.instance_count }}개" >> $GITHUB_STEP_SUMMARY
        echo "- **검증 방식**: ALB Target Group + Public URL" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📊 헬스체크 결과" >> $GITHUB_STEP_SUMMARY
        echo "- **ALB Target Group**: 모든 인스턴스 Healthy ✅" >> $GITHUB_STEP_SUMMARY
        echo "- **Public URL**: 응답 성공 ✅" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔧 수동 배포 가이드" >> $GITHUB_STEP_SUMMARY
        echo "### 📜 1단계: 최초 1회 설정 (.env 파일 생성)" >> $GITHUB_STEP_SUMMARY
        echo "- **목표**: 각 EC2 인스턴스에 환경변수 파일 생성" >> $GITHUB_STEP_SUMMARY
        echo "- **방법**: 아래 스크립트를 각 인스턴스에서 실행 후, GitHub Secret 'ENV_BACKEND_DEV' 내용을 붙여넣고 Ctrl+D를 누르세요." >> $GITHUB_STEP_SUMMARY
        echo '```bash' >> $GITHUB_STEP_SUMMARY
        echo "sudo mkdir -p /opt/ktb-chat-backend/backend" >> $GITHUB_STEP_SUMMARY
        echo "sudo touch /opt/ktb-chat-backend/backend/.env" >> $GITHUB_STEP_SUMMARY
        echo "sudo chown ec2-user:ec2-user /opt/ktb-chat-backend/backend/.env" >> $GITHUB_STEP_SUMMARY
        echo "cat << EOF > /opt/ktb-chat-backend/backend/.env" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📜 2단계: 코드 배포 (배포 시마다 실행)" >> $GITHUB_STEP_SUMMARY
        echo "- **목표**: 최신 코드를 배포하고 클러스터 모드로 애플리케이션 실행" >> $GITHUB_STEP_SUMMARY
        echo "- **방법**: 아래 스크립트를 각 인스턴스에서 실행하세요." >> $GITHUB_STEP_SUMMARY
        echo '```bash' >> $GITHUB_STEP_SUMMARY
        echo "#!/bin/bash" >> $GITHUB_STEP_SUMMARY
        echo "set -e" >> $GITHUB_STEP_SUMMARY
        echo "sudo swapoff -a" >> $GITHUB_STEP_SUMMARY
        echo "cd /tmp && rm -rf ktb-new && git clone -b jacky2 https://github.com/100-hours-a-week/8-ktb-chat.git ktb-new" >> $GITHUB_STEP_SUMMARY
        echo "sudo -u ec2-user pm2 delete all || true" >> $GITHUB_STEP_SUMMARY
        echo "sudo cp -r ktb-new/backend/* /opt/ktb-chat-backend/backend/ && cd /opt/ktb-chat-backend/backend" >> $GITHUB_STEP_SUMMARY
        echo "sudo chown -R ec2-user:ec2-user /opt/ktb-chat-backend" >> $GITHUB_STEP_SUMMARY
        echo "sudo -u ec2-user npm ci --production" >> $GITHUB_STEP_SUMMARY
        echo "sudo -u ec2-user pm2 start server.js --name 'ktb-backend-single' --max-memory-restart 700M --node-args='--max-old-space-size=600'" >> $GITHUB_STEP_SUMMARY
        echo "sudo -u ec2-user pm2 save" >> $GITHUB_STEP_SUMMARY
        echo "sudo env PATH=\$PATH:/usr/bin /usr/lib/node_modules/pm2/bin/pm2 startup systemd -u ec2-user --hp /home/ec2-user" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        
                 # 배포 상태에 따른 상세 정보 추가
         if [[ "${{ steps.verify-deployment.outputs.healthy_count }}" == "${{ steps.get-instances.outputs.instance_count }}" ]]; then
           echo "### 🎉 배포 성공" >> $GITHUB_STEP_SUMMARY
           echo "- ✅ **완벽한 배포**: 모든 인스턴스가 헬스체크를 통과했습니다" >> $GITHUB_STEP_SUMMARY
           echo "- 🚀 **서비스 상태**: 정상 운영 중" >> $GITHUB_STEP_SUMMARY
           echo "- 📈 **가용성**: 100% (모든 서버 정상)" >> $GITHUB_STEP_SUMMARY
         else
        echo "### ⚠️ 배포 주의사항" >> $GITHUB_STEP_SUMMARY
           echo "- **문제 인스턴스**: ${{ steps.verify-deployment.outputs.unhealthy_instances }}" >> $GITHUB_STEP_SUMMARY
           echo "- **가용성**: $(echo "scale=1; ${{ steps.verify-deployment.outputs.healthy_count }} * 100 / ${{ steps.get-instances.outputs.instance_count }}" | bc)%" >> $GITHUB_STEP_SUMMARY
           echo "- **조치 필요**: 문제 인스턴스 수동 확인 및 재시작 권장" >> $GITHUB_STEP_SUMMARY
           echo "- **로그 확인**: AWS Systems Manager 콘솔에서 상세 로그를 확인하세요" >> $GITHUB_STEP_SUMMARY
         fi
        echo "### 🔧 부하 테스트 최적화 배포 가이드 (클러스터 모드)" >> $GITHUB_STEP_SUMMARY
        echo "- **t3.small 최적화**: 2vCPU, 2GB RAM 최대 활용" >> $GITHUB_STEP_SUMMARY
        echo "- **PM2 클러스터 모드**: 2개 프로세스로 처리량 2배 향상" >> $GITHUB_STEP_SUMMARY
        echo '```bash' >> $GITHUB_STEP_SUMMARY
        echo "#!/bin/bash" >> $GITHUB_STEP_SUMMARY
        echo "cd /tmp && rm -rf ktb-new && git clone -b dev https://github.com/100-hours-a-week/8-ktb-chat.git ktb-new" >> $GITHUB_STEP_SUMMARY
        echo "sudo -u ec2-user pm2 delete all || true" >> $GITHUB_STEP_SUMMARY
        echo "sudo cp -r ktb-new/backend/* /opt/ktb-chat-backend/backend/ && cd /opt/ktb-chat-backend/backend" >> $GITHUB_STEP_SUMMARY
