# 백엔드 API CI/CD 파이프라인 
# 실행 중인 인스턴스에 코드 직접 배포 (빠른 배포)
name: Backend API CI/CD

on:
  push:
    branches: [ dev ]
    paths:
      - 'backend/**'
      - 'scripts/**'
      - '.github/workflows/backend-cicd.yml'

# 환경 변수 설정
env:
  AWS_REGION: ap-northeast-2
  # ASG 설정
  ASG_NAME: pumati-load-test-backend-asg
  # 배포 설정
  DEPLOY_USER: ec2-user
  BACKEND_PORT: 5001
  HEALTH_CHECK_PATH: /health

jobs:
  # 실행 중인 인스턴스에 코드 직접 배포
  deploy-to-running-instances:
    runs-on: ubuntu-latest
    
    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: AWS 자격증명 설정
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: 배포 메타데이터 생성
      id: meta
      run: |
        # Git 커밋 해시의 짧은 버전 생성
        SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
        
        # 타임스탬프 생성
        TIMESTAMP=$(date +%Y%m%d-%H%M%S)
        
        echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
        echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
        echo "deployment_id=deploy-${TIMESTAMP}-${SHORT_SHA}" >> $GITHUB_OUTPUT

    - name: ASG 인스턴스 목록 가져오기
      id: get-instances
      run: |
        echo "🔍 ASG에서 실행 중인 인스턴스 목록 가져오는 중..."
        
        # ASG에서 InService 상태의 인스턴스 ID 목록 가져오기
        INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
          --auto-scaling-group-names ${{ env.ASG_NAME }} \
          --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
          --output text)
        
        if [[ -z "$INSTANCE_IDS" ]]; then
          echo "❌ 실행 중인 인스턴스를 찾을 수 없습니다."
          exit 1
        fi
        
        # 인스턴스 세부 정보 가져오기 (IP 주소 포함)
        echo "📋 인스턴스 세부 정보:"
        INSTANCE_IPS=""
        INSTANCE_COUNT=0
        
        for INSTANCE_ID in $INSTANCE_IDS; do
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids $INSTANCE_ID \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          
          PRIVATE_IP=$(aws ec2 describe-instances \
            --instance-ids $INSTANCE_ID \
            --query 'Reservations[0].Instances[0].PrivateIpAddress' \
            --output text)
          
          echo "- ${INSTANCE_ID}: Public=${PUBLIC_IP}, Private=${PRIVATE_IP}"
          
          if [[ "$PUBLIC_IP" != "None" && "$PUBLIC_IP" != "" ]]; then
            INSTANCE_IPS="${INSTANCE_IPS}${PUBLIC_IP} "
            INSTANCE_COUNT=$((INSTANCE_COUNT + 1))
          fi
        done
        
        echo "✅ 배포 대상 인스턴스: ${INSTANCE_COUNT}개"
        echo "instance_ids=${INSTANCE_IDS}" >> $GITHUB_OUTPUT
        echo "instance_ips=${INSTANCE_IPS}" >> $GITHUB_OUTPUT
        echo "instance_count=${INSTANCE_COUNT}" >> $GITHUB_OUTPUT

    - name: 간단한 배포 준비
      run: |
        echo "📝 간단한 배포 준비 중..."
        echo "⚠️ SSM 권한이 없어 외부 헬스체크만 진행합니다"
        echo "배포는 수동으로 각 인스턴스에서 수행이 필요할 수 있습니다"

    - name: 수동 배포 안내 및 기본 체크
      id: manual-deploy
      run: |
        echo "⚠️ SSM 권한이 없어 자동 배포를 수행할 수 없습니다"
        echo "대신 헬스체크를 통해 현재 서비스 상태를 확인합니다"
        
        INSTANCE_IPS="${{ steps.get-instances.outputs.instance_ips }}"
        TOTAL_INSTANCES=${{ steps.get-instances.outputs.instance_count }}
        
        echo "📋 체크 대상: ${TOTAL_INSTANCES}개 인스턴스"
        echo "IP 목록: ${INSTANCE_IPS}"
        
        # 수동 배포를 위한 스크립트 제공
        echo ""
        echo "🔧 각 인스턴스에서 수동으로 실행할 배포 명령 (클러스터 + 스왑 OFF):"
        echo "===================================================================" 
        echo "#!/bin/bash"
        echo "echo '=== 스왑 비활성화 ==='"
        echo "sudo swapoff -a"
        echo ""
        echo "echo '=== 코드 배포 및 재시작 ==='"
        echo "cd /tmp && rm -rf ktb-new"
        echo "git clone -b dev https://github.com/100-hours-a-week/8-ktb-chat.git ktb-new"
        echo "sudo -u ec2-user pm2 delete all || true"
        echo "sudo cp -r ktb-new/backend/* /opt/ktb-chat-backend/backend/"
        echo "cd /opt/ktb-chat-backend/backend"
        echo "sudo -u ec2-user npm ci --production"
        echo ""
        echo "# PM2 클러스터 모드로 시작 (2vCPU 활용)"
        echo "sudo -u ec2-user pm2 start server.js \\"
        echo "  --name 'ktb-backend-cluster' \\"
        echo "  --instances 2 \\"
        echo "  --exec-mode cluster \\"
        echo "  --max-memory-restart 700M \\"
        echo "  --node-args='--max-old-space-size=600' \\"
        echo "  --restart-delay 3000 \\"
        echo "  --min-uptime 10s"
        echo ""
        echo "# 재부팅 시 자동 실행 설정"
        echo "sudo -u ec2-user pm2 save"
        echo "sudo env PATH=\$PATH:/usr/bin /usr/lib/node_modules/pm2/bin/pm2 startup systemd -u ec2-user --hp /home/ec2-user"
        echo ""
        echo "# 상태 확인"
        echo "sleep 10"
        echo "curl -f http://localhost:5001/health || echo 'Health check failed!'"
        echo "sudo -u ec2-user pm2 list"
        echo "==================================================================="
        
        # 수동 배포로 가정하고 결과 설정
        echo "success_count=0" >> $GITHUB_OUTPUT
        echo "failed_count=0" >> $GITHUB_OUTPUT
        echo "manual_deploy=true" >> $GITHUB_OUTPUT

    - name: 배포 후 검증
      id: verify-deployment
      run: |
        echo "🔍 배포 후 전체 서비스 상태 검증 중..."
        
        INSTANCE_IPS="${{ steps.get-instances.outputs.instance_ips }}"
        HEALTHY_COUNT=0
        UNHEALTHY_INSTANCES=""
        
                 for IP in $INSTANCE_IPS; do
           echo "인스턴스 ${IP} 헬스체크 중..."
           
           # 최대 60초간 헬스체크 시도 (배포 후 서비스 시작 시간 고려)
           HEALTHY=false
           for i in {1..12}; do
             echo "  시도 ${i}/12: ${IP}:${{ env.BACKEND_PORT }}${{ env.HEALTH_CHECK_PATH }}"
             
             # 헬스체크 API 호출
             if curl -f -m 10 "http://${IP}:${{ env.BACKEND_PORT }}${{ env.HEALTH_CHECK_PATH }}" >/dev/null 2>&1; then
               echo "✅ ${IP} 헬스체크 성공"
               HEALTHY=true
               break
             fi
             
             # 마지막 시도가 아니면 대기
             if [[ $i -lt 12 ]]; then
               echo "  ${IP} 응답 대기 중... (5초 후 재시도)"
               sleep 5
             fi
           done
           
           if [[ "$HEALTHY" == "true" ]]; then
             HEALTHY_COUNT=$((HEALTHY_COUNT + 1))
           else
             echo "❌ ${IP} 헬스체크 실패 - 서비스가 정상적으로 시작되지 않았습니다"
             UNHEALTHY_INSTANCES="${UNHEALTHY_INSTANCES}${IP} "
           fi
         done
        
                 echo "📊 최종 헬스체크 결과: ${HEALTHY_COUNT}/${{ steps.get-instances.outputs.instance_count }} 성공"
         
         if [[ $HEALTHY_COUNT -eq ${{ steps.get-instances.outputs.instance_count }} ]]; then
           echo "🎉 모든 인스턴스가 정상 상태입니다!"
           echo "✅ 배포 성공: 모든 서비스가 헬스체크를 통과했습니다"
         else
           echo "⚠️ 일부 인스턴스에서 문제가 발생했습니다"
           echo "문제 인스턴스: ${UNHEALTHY_INSTANCES}"
           echo "❌ 배포 부분 실패: ${HEALTHY_COUNT}/${{ steps.get-instances.outputs.instance_count }} 인스턴스만 정상"
           
           # 헬스체크 실패한 인스턴스가 50% 이상이면 배포 실패로 처리
           TOTAL_INSTANCES=${{ steps.get-instances.outputs.instance_count }}
           FAILURE_THRESHOLD=$((TOTAL_INSTANCES / 2))
           
           if [[ $HEALTHY_COUNT -le $FAILURE_THRESHOLD ]]; then
             echo "💥 심각한 배포 실패: 50% 이상의 인스턴스가 실패했습니다"
             exit 1
           fi
         fi
         
         echo "healthy_count=${HEALTHY_COUNT}" >> $GITHUB_OUTPUT
         echo "unhealthy_instances=${UNHEALTHY_INSTANCES}" >> $GITHUB_OUTPUT

    - name: 배포 결과 요약
      if: always()
      run: |
        echo "## 🚀 빠른 코드 배포 완료" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📋 배포 정보" >> $GITHUB_STEP_SUMMARY
        echo "- **배포 ID**: \`${{ steps.meta.outputs.deployment_id }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **커밋**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **브랜치**: dev" >> $GITHUB_STEP_SUMMARY
        echo "- **배포 시간**: ${{ steps.meta.outputs.timestamp }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🎯 배포 대상" >> $GITHUB_STEP_SUMMARY
        echo "- **ASG**: \`${{ env.ASG_NAME }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **대상 인스턴스**: ${{ steps.get-instances.outputs.instance_count }}개" >> $GITHUB_STEP_SUMMARY
        echo "- **배포 명령 ID**: \`${{ steps.parallel-deploy.outputs.command_id }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
                 echo "### 📊 배포 결과" >> $GITHUB_STEP_SUMMARY
                 echo "- **자동 배포**: ❌ SSM 권한 없음 (수동 배포 필요)" >> $GITHUB_STEP_SUMMARY
         echo "- **헬스체크 통과**: ${{ steps.verify-deployment.outputs.healthy_count }}개" >> $GITHUB_STEP_SUMMARY
         echo "- **헬스체크 실패**: $((${{ steps.get-instances.outputs.instance_count }} - ${{ steps.verify-deployment.outputs.healthy_count }}))개" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔧 수동 배포 가이드" >> $GITHUB_STEP_SUMMARY
        echo "- **배포 스크립트**: 각 인스턴스에서 아래 명령어 실행" >> $GITHUB_STEP_SUMMARY
        echo '```bash' >> $GITHUB_STEP_SUMMARY
        echo "cd /tmp && rm -rf ktb-new" >> $GITHUB_STEP_SUMMARY
        echo "git clone -b dev https://github.com/100-hours-a-week/8-ktb-chat.git ktb-new" >> $GITHUB_STEP_SUMMARY
        echo "sudo -u ec2-user pm2 stop ktb-chat-backend || true" >> $GITHUB_STEP_SUMMARY
        echo "sudo cp -r ktb-new/backend/* /opt/ktb-chat-backend/backend/" >> $GITHUB_STEP_SUMMARY
        echo "cd /opt/ktb-chat-backend/backend" >> $GITHUB_STEP_SUMMARY
        echo "sudo -u ec2-user npm ci --production" >> $GITHUB_STEP_SUMMARY
        echo "sudo -u ec2-user pm2 start ktb-chat-backend" >> $GITHUB_STEP_SUMMARY
        echo "curl http://localhost:5001/health" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
                 # 배포 상태에 따른 상세 정보 추가
         if [[ "${{ steps.verify-deployment.outputs.healthy_count }}" == "${{ steps.get-instances.outputs.instance_count }}" ]]; then
           echo "### 🎉 배포 성공" >> $GITHUB_STEP_SUMMARY
           echo "- ✅ **완벽한 배포**: 모든 인스턴스가 헬스체크를 통과했습니다" >> $GITHUB_STEP_SUMMARY
           echo "- 🚀 **서비스 상태**: 정상 운영 중" >> $GITHUB_STEP_SUMMARY
           echo "- 📈 **가용성**: 100% (모든 서버 정상)" >> $GITHUB_STEP_SUMMARY
         else
           echo "### ⚠️ 배포 주의사항" >> $GITHUB_STEP_SUMMARY
           echo "- **문제 인스턴스**: ${{ steps.verify-deployment.outputs.unhealthy_instances }}" >> $GITHUB_STEP_SUMMARY
           echo "- **가용성**: $(echo "scale=1; ${{ steps.verify-deployment.outputs.healthy_count }} * 100 / ${{ steps.get-instances.outputs.instance_count }}" | bc)%" >> $GITHUB_STEP_SUMMARY
           echo "- **조치 필요**: 문제 인스턴스 수동 확인 및 재시작 권장" >> $GITHUB_STEP_SUMMARY
           echo "- **로그 확인**: AWS Systems Manager 콘솔에서 상세 로그를 확인하세요" >> $GITHUB_STEP_SUMMARY
         fi
        echo "### 🔧 부하 테스트 최적화 배포 가이드 (클러스터 모드)" >> $GITHUB_STEP_SUMMARY
        echo "- **t3.small 최적화**: 2vCPU, 2GB RAM 최대 활용" >> $GITHUB_STEP_SUMMARY
        echo "- **PM2 클러스터 모드**: 2개 프로세스로 처리량 2배 향상" >> $GITHUB_STEP_SUMMARY
        echo '```bash' >> $GITHUB_STEP_SUMMARY
        echo "#!/bin/bash" >> $GITHUB_STEP_SUMMARY
        echo "cd /tmp && rm -rf ktb-new && git clone -b dev https://github.com/100-hours-a-week/8-ktb-chat.git ktb-new" >> $GITHUB_STEP_SUMMARY
        echo "sudo -u ec2-user pm2 delete all || true" >> $GITHUB_STEP_SUMMARY
        echo "sudo cp -r ktb-new/backend/* /opt/ktb-chat-backend/backend/ && cd /opt/ktb-chat-backend/backend" >> $GITHUB_STEP_SUMMARY
        echo "sudo -u ec2-user npm ci --production" >> $GITHUB_STEP_SUMMARY
        echo "sudo -u ec2-user pm2 start server.js --name 'ktb-backend-cluster' --instances 2 --exec-mode cluster --max-memory-restart 700M --node-args='--max-old-space-size=600'" >> $GITHUB_STEP_SUMMARY
        echo "sudo -u ec2-user pm2 save" >> $GITHUB_STEP_SUMMARY
        echo "sudo env PATH=\$PATH:/usr/bin /usr/lib/node_modules/pm2/bin/pm2 startup systemd -u ec2-user --hp /home/ec2-user" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "### 🔧 최종 배포 가이드 (클러스터 + 스왑 OFF)" >> $GITHUB_STEP_SUMMARY
        echo "- **t3.small 최적화**: 2vCPU, 2GB RAM, 스왑 OFF" >> $GITHUB_STEP_SUMMARY
        echo "- **PM2 클러스터 모드**: 2개 프로세스로 처리량 2배 향상" >> $GITHUB_STEP_SUMMARY
        echo '```bash' >> $GITHUB_STEP_SUMMARY
        echo "#!/bin/bash" >> $GITHUB_STEP_SUMMARY
        echo "sudo swapoff -a" >> $GITHUB_STEP_SUMMARY
        echo "cd /tmp && rm -rf ktb-new && git clone -b dev https://github.com/100-hours-a-week/8-ktb-chat.git ktb-new" >> $GITHUB_STEP_SUMMARY
        echo "sudo -u ec2-user pm2 delete all || true" >> $GITHUB_STEP_SUMMARY
        echo "sudo cp -r ktb-new/backend/* /opt/ktb-chat-backend/backend/ && cd /opt/ktb-chat-backend/backend" >> $GITHUB_STEP_SUMMARY
        echo "sudo -u ec2-user npm ci --production" >> $GITHUB_STEP_SUMMARY
        echo "sudo -u ec2-user pm2 start server.js --name 'ktb-backend-cluster' --instances 2 --exec-mode cluster --max-memory-restart 700M --node-args='--max-old-space-size=600'" >> $GITHUB_STEP_SUMMARY
        echo "sudo -u ec2-user pm2 save" >> $GITHUB_STEP_SUMMARY
        echo "sudo env PATH=\$PATH:/usr/bin /usr/lib/node_modules/pm2/bin/pm2 startup systemd -u ec2-user --hp /home/ec2-user" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY